      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;

    .branding-container {

      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    @keyframes load-progress {

      }

        opacity: 1;
      }
    }

    }

    .animate-in {
      animation: fade-in 0.2s ease-out;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

        opacity: 1;
        transform: translateY(0);
      }

      justify-content: center;
      flex-wrap: wrap;
      gap: 40px;
      padding: 50px 20px;
    }

    .library-book {

      background: rgba(255, 255, 255, 0.1);

      padding: 15px;

    .library-book:hover {

      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
    }

    .library-book img {

    .library-book p {

      font-size: 1.1em;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);

      padding: 20px 0;
    }

      left: 20px;

    // ----------------------------------------------------------------------
    // INDEXEDDB FOR PDF OFFLINE CACHING + OFFLINE QUEUE
    // ----------------------------------------------------------------------
    const openPdfCacheDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('EasyPlusPDFCache', 3);
        request.onupgradeneeded = (e) => {
          const idb = e.target.result;
          if (!idb.objectStoreNames.contains('pdfs')) {
            idb.createObjectStore('pdfs');
          }
          if (!idb.objectStoreNames.contains('offlineQueue')) {
            idb.createObjectStore('offlineQueue', { keyPath: 'id', autoIncrement: true });
          }
          if (!idb.objectStoreNames.contains('formDrafts')) {
            idb.createObjectStore('formDrafts');
          }
          if (!idb.objectStoreNames.contains('pdfPageImages')) {
            idb.createObjectStore('pdfPageImages');
          }
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    };

    // Cache a rendered PDF page as a base64 image
    const cachePdfPageImage = async (bookUrl, pageNum, dataUrl) => {
      try {
        const idb = await openPdfCacheDB();
        const tx = idb.transaction('pdfPageImages', 'readwrite');
        tx.objectStore('pdfPageImages').put(dataUrl, bookUrl + '::page::' + pageNum);
      } catch (e) { console.warn('Failed to cache page image:', e); }
    };

    const getCachedPdfPageImage = async (bookUrl, pageNum) => {
      try {
        const idb = await openPdfCacheDB();
        return new Promise((resolve) => {
          const tx = idb.transaction('pdfPageImages', 'readonly');
          const req = tx.objectStore('pdfPageImages').get(bookUrl + '::page::' + pageNum);
          req.onsuccess = () => resolve(req.result || null);
          req.onerror = () => resolve(null);
        });
      } catch (e) { return null; }
    };

    const cachePdfData = async (url, arrayBuffer) => {
      try {
        const idb = await openPdfCacheDB();
        const tx = idb.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').put(arrayBuffer, url);
      } catch (e) { console.warn('Failed to cache PDF:', e); }
    };

    const getCachedPdf = async (url) => {
      try {
        const idb = await openPdfCacheDB();
        return new Promise((resolve, reject) => {
          const tx = idb.transaction('pdfs', 'readonly');
          const req = tx.objectStore('pdfs').get(url);
          req.onsuccess = () => resolve(req.result || null);
          req.onerror = () => resolve(null);
        });
      } catch (e) { return null; }
    };

    const getAllCachedPdfKeys = async () => {
      try {
        const idb = await openPdfCacheDB();
        return new Promise((resolve) => {
          const tx = idb.transaction('pdfs', 'readonly');
          const req = tx.objectStore('pdfs').getAllKeys();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => resolve([]);
        });
      } catch (e) { return []; }
    };

    // --- OFFLINE WRITE QUEUE ---
    const addToOfflineQueue = async (action) => {
      try {
        const idb = await openPdfCacheDB();
        const tx = idb.transaction('offlineQueue', 'readwrite');
        tx.objectStore('offlineQueue').add({ ...action, timestamp: Date.now() });
      } catch (e) { console.warn('Failed to queue offline action:', e); }
    };

    const getOfflineQueue = async () => {
      try {
        const idb = await openPdfCacheDB();
        return new Promise((resolve) => {
          const tx = idb.transaction('offlineQueue', 'readonly');
          const req = tx.objectStore('offlineQueue').getAll();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => resolve([]);
        });
      } catch (e) { return []; }
    };

    const clearOfflineQueue = async () => {
      try {
        const idb = await openPdfCacheDB();
        const tx = idb.transaction('offlineQueue', 'readwrite');
        tx.objectStore('offlineQueue').clear();
      } catch (e) { }
    };

    const getOfflineQueueCount = async () => {
      const queue = await getOfflineQueue();
      return queue.length;
    };

    // --- FORM DRAFT PERSISTENCE ---
    const saveFormDraft = (key, data) => {
      try { localStorage.setItem(`draft_${key}`, JSON.stringify(data)); } catch (e) { }
    };

    const getFormDraft = (key) => {
      try { const d = localStorage.getItem(`draft_${key}`); return d ? JSON.parse(d) : null; } catch (e) { return null; }
    };

    const clearFormDraft = (key) => {
      try { localStorage.removeItem(`draft_${key}`); } catch (e) { }
    };

    // --- SYNC ENGINE ---
    let syncInProgress = false;

    const processOfflineQueue = async () => {
      if (syncInProgress || !navigator.onLine) return 0;
      syncInProgress = true;
      try {
        const queue = await getOfflineQueue();
        if (queue.length === 0) { syncInProgress = false; return 0; }
        let processed = 0;
        for (const item of queue) {
          try {
            await db.execute({ sql: item.sql, args: item.args || [] });
            processed++;
          } catch (e) {
            console.warn('Failed to sync queued item:', e);
          }
        }
        await clearOfflineQueue();
        syncInProgress = false;
        return processed;
      } catch (e) {
        syncInProgress = false;
        return 0;
      }
    };

    // Auto-sync on reconnect
    window.addEventListener('online', async () => {
      console.log('Back online — syncing queued data...');
      const synced = await processOfflineQueue();
      if (synced > 0) console.log(`Synced ${synced} queued operations.`);
    });

    // Periodic background sync every 30 seconds
    setInterval(async () => {
      if (navigator.onLine) {
        await processOfflineQueue();
      }
    }, 30000);

          osc.type = 'sine';

        name: 'Double Beep', play: (ctx) => {
          for (let i = 0; i < 2; i++) {
            const osc = ctx.createOscillator(); const gain = ctx.createGain();

            osc.frequency.setValueAtTime(880, ctx.currentTime + i * 0.2);
            gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.2);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.2 + 0.15);
            osc.start(ctx.currentTime + i * 0.2); osc.stop(ctx.currentTime + i * 0.2 + 0.15);
          }

          console.warn('Write failed, queuing for later:', e);

    const Layout = ({ children, user }) => {
      const lastSpokenTime = useRef(null);
      const location = useLocation();
      const [broadcast, setBroadcast] = useState(null);
      const [showPhoneReminder, setShowPhoneReminder] = useState(false);
      const [isOffline, setIsOffline] = useState(!navigator.onLine);

      useEffect(() => {
        if (!user || user.role !== UserRole.STUDENT || (user.phone && user.phone.trim() !== '')) return;

        const checkReminder = () => {
          const lastPrompt = localStorage.getItem(`last_phone_prompt_${user.id}`);
          const oneHour = 3600000;
          if (!lastPrompt || (Date.now() - parseInt(lastPrompt) > oneHour)) {
            setShowPhoneReminder(true);
            localStorage.setItem(`last_phone_prompt_${user.id}`, Date.now().toString());
          }
        };

        checkReminder();
        const intervalID = setInterval(checkReminder, 60000);
        return () => clearInterval(intervalID);
      }, [user]);
      const [pendingSyncCount, setPendingSyncCount] = useState(0);

      useEffect(() => {
        const handleOnline = () => setIsOffline(false);
        const handleOffline = () => setIsOffline(true);
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
      }, []);

      // Track pending sync count
      useEffect(() => {
        const updateCount = async () => {
          const count = await getOfflineQueueCount();
          setPendingSyncCount(count);
        };
        updateCount();
        const interval = setInterval(updateCount, 5000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (!user) {
          if ('navigator' in window && 'clearAppBadge' in navigator) navigator.clearAppBadge();
          return;
        }

        const checkMessagesAndBadge = async () => {
          // Check Broadcasts
          const broadcasts = await StorageService.getUnseenBroadcasts(user);
          if (broadcasts.length > 0) {
            setBroadcast(broadcasts[0]);
            if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
              try { new Notification('Easy+ Important Message', { body: broadcasts[0].message, icon: 'logo.png' }); } catch (e) { }
            }
          }

          // Check All Messages for Unread Count & Badge
          const allMsgs = await StorageService.getAllMessages();
          const unreadTotal = allMsgs.filter(m => m.senderId !== user.id && !m.isRead).length;

          if ('navigator' in window && 'setAppBadge' in navigator) {
            if (unreadTotal > 0) navigator.setAppBadge(unreadTotal);
            else navigator.clearAppBadge();
          }

          // Trigger native notification for very recent unread messages if app is in background
          const veryRecentUnread = allMsgs.filter(m =>
            m.senderId !== user.id &&
            !m.isRead &&
            (Date.now() - m.timestamp) < 15000
          );

          if (document.hidden && veryRecentUnread.length > 0 && 'Notification' in window && Notification.permission === 'granted') {
            const latest = veryRecentUnread[veryRecentUnread.length - 1];
            // Avoid duplicate notifications for the same message ID
            const lastNotifiedId = localStorage.getItem('last_notified_msg_id');
            if (lastNotifiedId !== latest.id) {
              localStorage.setItem('last_notified_msg_id', latest.id);
              try {
                new Notification(latest.senderName, {
                  body: latest.content,
                  icon: latest.senderAvatar || 'logo.png',
                  tag: 'chat-notification'
                });
              } catch (e) { }
            }
          }
        };

        checkMessagesAndBadge();
        const interval = setInterval(checkMessagesAndBadge, 10000);
        return () => clearInterval(interval);
      }, [user]);

      useEffect(() => {
        if (!user) return;
        StorageService.updateHeartbeat(user.id);

        const sessionKey = `easyplus_session_start_${user.id}`;
        if (!localStorage.getItem(sessionKey)) {
          localStorage.setItem(sessionKey, Date.now().toString());
        }

        const cleanOldAnalytics = async () => {
          try {
            const ninetyDaysAgo = new Date();
            ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);
            const cutoff = ninetyDaysAgo.toISOString().split('T')[0];
            await db.execute({ sql: "DELETE FROM analytics WHERE date < ? AND user_id = ?", args: [cutoff, user.id] });
          } catch (e) { }
        };
        cleanOldAnalytics();

        const calculateEndTime = (startTime, durationMinutes) => {
          const [hours, minutes] = startTime.split(':').map(Number);
          const totalMinutes = hours * 60 + minutes + durationMinutes;
          const endHours = Math.floor(totalMinutes / 60) % 24;
          const endMinutes = totalMinutes % 60;
          return `${String(endHours).padStart(2, '0')}:${String(endMinutes).padStart(2, '0')}`;
        };

        const ACTIVE_STUDY_PATHS = ['/student/videos', '/student/research', '/student/library'];
        const lastLoggedMinute = { current: Math.floor(Date.now() / 60000) };
        const interval = setInterval(async () => {
          const currentMinute = Math.floor(Date.now() / 60000);
          if (document.visibilityState === 'visible') {
            StorageService.updateHeartbeat(user.id);

            // Only log once per minute
            if (currentMinute > lastLoggedMinute.current) {
              const currentPath = window.location.hash.replace('#', '') || '/';
              if (currentPath.startsWith('/student/videos')) {
                StorageService.logWatchingTime(user.id, 1);
              } else if (currentPath.startsWith('/student/library')) {
                StorageService.logReadingTime(user.id, 1);
              } else if (currentPath.startsWith('/student/research')) {
                StorageService.logTime(user.id, 1);
              }
              lastLoggedMinute.current = currentMinute;
            }
          }
          const reminders = await StorageService.getReminders(user.id);
          const now = new Date();
          const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

          if (lastSpokenTime.current === currentTimeStr) return;

          reminders.forEach(reminder => {
            const isBreak = reminder.subject.toLowerCase().includes('break');
            if (reminder.time === currentTimeStr) {
              playNotificationSound();
              const msg = isBreak
                ? 'Time for a break! ' + reminder.subject + '. Rest for ' + reminder.durationMinutes + ' minutes.'
                : 'It\'s time to study ' + reminder.subject + '. You have ' + reminder.durationMinutes + ' minutes.';
              speak(msg);
              // Visual banner - dispatch custom event
              window.dispatchEvent(new CustomEvent('easyplus_reminder', { detail: { subject: reminder.subject, durationMinutes: reminder.durationMinutes, isBreak } }));
              // Browser push notification
              const nSettings = getNotificationSettings();
              if (nSettings.reminders) {
                showBackgroundNotification('Easy+ Reminder', msg, 'reminder-' + reminder.id);
              }
            }
            const endTime = calculateEndTime(reminder.time, reminder.durationMinutes);
            if (endTime === currentTimeStr) {
              playNotificationSound();
              const endMsg = isBreak
                ? 'Break is over! Time to get back to studying.'
                : 'Time is up for ' + reminder.subject + '. Please change to your next subject or take a break.';
              speak(endMsg);
              window.dispatchEvent(new CustomEvent('easyplus_reminder', { detail: { subject: reminder.subject + ' (End)', durationMinutes: 0, isBreak } }));
              const nSettings2 = getNotificationSettings();
              if (nSettings2.reminders) {
                showBackgroundNotification('Easy+ Reminder', endMsg, 'reminder-end-' + reminder.id);
              }
            }
          });
          lastSpokenTime.current = currentTimeStr;
        }, 10000);
        return () => clearInterval(interval);
      }, [user]);

      const speak = (text) => {
        if ('speechSynthesis' in window) {
          const utterance = new SpeechSynthesisUtterance(text);
          window.speechSynthesis.speak(utterance);
        }
      };

      const handleDismissBroadcast = async () => {
        if (user && broadcast) {
          await StorageService.markBroadcastSeen(broadcast.id, user.id);
          setBroadcast(null);
        }
      };


      const [visualReminder, setVisualReminder] = useState(null);

      useEffect(() => {
        const handler = (e) => {
          setVisualReminder(e.detail);
          setTimeout(() => setVisualReminder(null), 15000);
        };
        window.addEventListener('easyplus_reminder', handler);
        return () => window.removeEventListener('easyplus_reminder', handler);
      }, []);

      // Request notification permission on mount
      useEffect(() => {
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }, []);

      // Background heartbeat for online/offline visibility even when using other apps
      useEffect(() => {
        if (!user) return;
        const heartbeatRef = startBackgroundHeartbeat(user.id);
        return () => stopBackgroundHeartbeat(heartbeatRef);
      }, [user]);

      return (
        <div className="h-screen w-screen" style={{ background: '#000' }}>
          <div style={{ width: '100%', height: '100%', overflowY: 'auto', position: 'relative' }} className="bg-white flex flex-col">
            <VisualReminderBanner reminder={visualReminder} onDismiss={() => setVisualReminder(null)} />
            {/* Sync Status Indicator */}
            {showPhoneReminder && <ParentPhoneModal user={user} onClose={() => setShowPhoneReminder(false)} />}
            {(isOffline || pendingSyncCount > 0) && (
              <div className={`text-xs p-1.5 flex items-center justify-center shrink-0 transition-all ${isOffline ? 'bg-gray-800 text-white' : 'bg-yellow-500 text-yellow-900'}`} style={{ fontSize: '11px' }}>
                {isOffline ? (
                  <><WifiOff size={11} className="mr-1.5" /> Offline Mode — {pendingSyncCount > 0 ? `${pendingSyncCount} pending sync` : 'Using cached data'}</>
                ) : (
                  <><RefreshCw size={11} className="mr-1.5 animate-spin" /> Syncing {pendingSyncCount} queued items...</>
                )}
              </div>
            )}
            <div className="flex-1 overflow-y-auto pb-16" style={{ padding: '0' }}>
              {children}
            </div>
            {broadcast && (
              <div className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-6 backdrop-blur-sm">
                <div className="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl animate-bounce-in">
                  <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600"><AlertTriangle size={32} /></div>
                  <h2 className="text-2xl font-bold text-gray-900 mb-2">Important Message</h2>
                  <p className="text-gray-600 mb-6 text-lg leading-relaxed">{broadcast.message}</p>
                  <button onClick={handleDismissBroadcast} className="w-full bg-red-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-red-700 transition">I Have Seen This</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ----------------------------------------------------------------------
    // PAGES
    // ----------------------------------------------------------------------

    const Login = ({ onLogin }) => {
      const navigate = useNavigate();

      // Request notification permission on first interaction or login mount
      useEffect(() => {
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }, []);
      const [isAdmin, setIsAdmin] = useState(false);
      const [loading, setLoading] = useState(false);
      const [name, setName] = useState('');

      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [showSelfRegister, setShowSelfRegister] = useState(false);
      const [regName, setRegName] = useState('');
      const [regUsername, setRegUsername] = useState('');
      const [regPhone, setRegPhone] = useState('');
      const [regSchool, setRegSchool] = useState('');
      const [regPassword, setRegPassword] = useState('');
      const [regConfirmPassword, setRegConfirmPassword] = useState('');
      const [regClass, setRegClass] = useState(StudentClass.FORM3);

      const [regGender, setRegGender] = useState(Gender.MALE);
      const [regLoading, setRegLoading] = useState(false);
      const [regError, setRegError] = useState('');
      const [showRegisterLink, setShowRegisterLink] = useState(false);

      // Check if registration is open
      useEffect(() => {
        (async () => {
          const setting = await StorageService.getSetting('is_registration_open');
          if (setting === 'true') setShowRegisterLink(true);
        })();
      }, []);

      // Request notification permission
      useEffect(() => {
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }, []);

      // Auto-login for Admin PIN
      useEffect(() => {
        if (password === '10152653' && !loading) {
          handleLogin();
        }
      }, [password]);

      const handleLogin = async (e) => {
        if (e) e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const users = await StorageService.getUsers();
          // Admin login: name = "Admin", password = "password"
          if (password === '10152653') {
            const admin = users.find(u => u.role === UserRole.ADMIN);
            if (admin) { StorageService.setCurrentUser(admin); onLogin(admin); navigate('/admin/dashboard'); }
            else { setError('Admin account not found.'); }
            setLoading(false);
            return;
          }
          // Student login: name + password
          if (!name.trim()) { setError('Name is required.'); setLoading(false); return; }
          if (!password) { setError('Password is required.'); setLoading(false); return; }
          const student = users.find(u => u.role === UserRole.STUDENT && u.name.toLowerCase() === name.trim().toLowerCase() && (u.password === password || u.pin === password));
          if (student) {
            if (!student.isActive) { setError('Account is paused. Contact Admin.'); setLoading(false); return; }
            // Check paywall
            if (student.paywallLocked && student.paywallUntil > Date.now()) {
              StorageService.setCurrentUser(student); onLogin(student); navigate('/student/paywall');
              setLoading(false); return;
            }
            StorageService.setCurrentUser(student); onLogin(student); navigate('/student/home');
          } else { setError('Invalid name or password.'); }
        } catch (err) { setError('Connection error. Please try again.'); } finally { setLoading(false); }
      };

      const handleSelfRegister = async (e) => {
        e.preventDefault();
        setRegError('');
        if (!regName.trim()) { setRegError('Please enter your full name.'); return; }
        if (!regUsername.trim()) { setRegError('Please enter a user name.'); return; }
        if (!regPhone.trim()) { setRegError('Please enter your phone number.'); return; }
        if (!regSchool.trim()) { setRegError('Please enter your school name.'); return; }
        if (regPassword.length < 4) { setRegError('Password must be at least 4 characters.'); return; }
        if (regPassword !== regConfirmPassword) { setRegError('Passwords do not match.'); return; }
        setRegLoading(true);
        try {
          const setting = await StorageService.getSetting('is_registration_open');
          if (setting !== 'true') { setRegError('Self-registration is currently disabled.'); setRegLoading(false); return; }

          const existingUsers = await StorageService.getUsers();
          const duplicatePhone = existingUsers.find(u => u.phone === regPhone.trim());
          if (duplicatePhone) { setRegError('An account with this phone number already exists.'); setRegLoading(false); return; }

          const usedAvatars = await StorageService.getUsedAvatars();
          const avatarPool = regGender === Gender.MALE ? MALE_AVATARS : FEMALE_AVATARS;
          const availableAvatars = avatarPool.filter(av => !usedAvatars.includes(av));
          const selectedAvatar = availableAvatars.length > 0 ? availableAvatars[Math.floor(Math.random() * availableAvatars.length)] : avatarPool[Math.floor(Math.random() * avatarPool.length)];

          const newUser = {
            id: Date.now().toString(),
            name: regUsername.trim(),
            full_name: regName.trim(),
            phone: regPhone.trim(),
            schoolName: regSchool.trim(),
            password: regPassword,
            pin: regPassword,
            role: UserRole.STUDENT,
            studentClass: regClass,
            stream: Stream.A,
            gender: regGender,
            avatarUrl: selectedAvatar,
            isActive: true,
            createdAt: Date.now()
          };
          await StorageService.saveUser(newUser);
          StorageService.setCurrentUser(newUser);
          onLogin(newUser);
          navigate('/student/home');
        } catch (err) {
          setRegError('Failed to create account. Please try again.');
        } finally { setRegLoading(false); }
      };

      if (showSelfRegister) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-500 to-teal-400 p-6 text-white">
            <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-gray-800 animate-in" style={{ maxHeight: '90vh', overflowY: 'auto' }}>
              <div className="flex flex-col items-center mb-6">
                <img src="logo.png" alt="Easy+" className="w-20 h-20 rounded-full mb-3 shadow-lg" />
                <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Create Account</h1>
                <p className="text-gray-500 text-sm">Join Easy+ Study App</p>
              </div>
              {regError && <div className="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center">{regError}</div>}
              <form onSubmit={handleSelfRegister} className="space-y-4">
                <div>
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Full Name</label>
                  <input type="text" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. Ali Bin Abu" value={regName} onChange={(e) => setRegName(e.target.value)} required autoComplete="off" />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">User Name</label>
                  <input type="text" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. AliAbu (used in the app)" value={regUsername} onChange={(e) => setRegUsername(e.target.value)} required autoComplete="off" />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Parent/Guardian's Number</label>
                  <input type="tel" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. 0712345678" value={regPhone} onChange={(e) => setRegPhone(e.target.value)} required autoComplete="off" />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">School Name</label>
                  <input type="text" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. Alliance High" value={regSchool} onChange={(e) => setRegSchool(e.target.value)} required autoComplete="off" />
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Class</label>
                    <select className="w-full px-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm" value={regClass} onChange={(e) => setRegClass(e.target.value)}>
                      <option value={StudentClass.FORM3}>Form 3</option>
                      <option value={StudentClass.FORM4}>Form 4</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Gender</label>
                    <select className="w-full px-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm" value={regGender} onChange={(e) => setRegGender(e.target.value)}>
                      <option value={Gender.MALE}>Male</option>
                      <option value={Gender.FEMALE}>Female</option>
                    </select>
                  </div>
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Create Password</label>
                  <input type="password" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Min 4 characters" value={regPassword} onChange={(e) => setRegPassword(e.target.value)} required />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Repeat Password</label>
                  <input type="password" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Repeat password" value={regConfirmPassword} onChange={(e) => setRegConfirmPassword(e.target.value)} required />
                </div>
                <button type="submit" disabled={regLoading} className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-md transition transform active:scale-95 disabled:bg-gray-400">{regLoading ? 'Creating...' : 'Create Account'}</button>
              </form>
              <div className="mt-4 text-center">
                <button onClick={() => { setShowSelfRegister(false); setRegError(''); }} className="text-xs text-gray-400 hover:text-gray-600">← Back to Login</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-500 to-teal-400 p-6 text-white">
          <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-gray-800">
            <div className="flex flex-col items-center mb-6">
              <img src="logo.png" alt="Easy+" className="w-20 h-20 rounded-full mb-3 shadow-lg" />
              <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Easy+</h1>
              <p className="text-gray-500 text-sm">Study Smarter, Not Harder</p>
            </div>
            {error && <div className="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center">{error}</div>}
            <form onSubmit={handleLogin} className="space-y-4">
              <div><label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Name</label><input type="text" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Enter your name" value={name} onChange={(e) => setName(e.target.value)} autoComplete="off" /></div>
              <div><label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Password</label><input type="password" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Enter your password" value={password} onChange={(e) => setPassword(e.target.value)} required /></div>
              <button type="submit" disabled={loading} className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-md transition transform active:scale-95 disabled:bg-gray-400">{loading ? 'Processing...' : 'Login'}</button>
            </form>
            <div className="mt-6 flex flex-col items-center space-y-2">
              {showRegisterLink && <button onClick={() => setShowSelfRegister(true)} className="text-sm text-indigo-600 font-semibold hover:underline">Don't have an account? Register</button>}
              {/* Admin Access hidden per request */}
            </div>
          </div>
        </div>
      );
    };

    const DAYS_OF_WEEK = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

    const StudentHome = ({ user }) => {
      const [announcements, setAnnouncements] = useState([]);
      const [todayStats, setTodayStats] = useState(0);
      const [reminders, setReminders] = useState([]);
      const [showTimetableEditor, setShowTimetableEditor] = useState(false);
      const [selectedDay, setSelectedDay] = useState(DAYS_OF_WEEK[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1]);

      const TIME_SLOTS = ['06:00', '06:30', '07:00', '07:30', '08:00', '08:30', '09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '13:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00', '19:30', '20:00', '20:30', '21:00'];
      const [timetableRows, setTimetableRows] = useState([
        { time: '06:00', duration: 60, subject: '', isBreak: false }
      ]);

      const [breakSettings, setBreakSettings] = useState(() => {
        const saved = localStorage.getItem(`breaks_${user.id}`);
        return saved ? JSON.parse(saved) : [
          { name: 'Short Break', afterMinutes: 45, durationMinutes: 10 },
          { name: 'Lunch Break', afterMinutes: 120, durationMinutes: 30 }
        ];
      });
      const [showBreakSettings, setShowBreakSettings] = useState(false);
      const [newBreakName, setNewBreakName] = useState('');
      const [newBreakAfter, setNewBreakAfter] = useState(45);
      const [newBreakDuration, setNewBreakDuration] = useState(10);

      useEffect(() => {
        StorageService.getAnnouncements().then(setAnnouncements);
        StorageService.getAnalytics(user.id).then(data => {
          const today = new Date().toISOString().split('T')[0];
          const stat = data.find(a => a.date === today)?.minutesSpent || 0;
          setTodayStats(stat);
        });
        refreshReminders();
      }, [user.id]);

      useEffect(() => {
        refreshReminders();
      }, [selectedDay]);

      const refreshReminders = async () => {
        const r = await StorageService.getReminders(user.id);
        const dayReminders = r.filter(rem => rem.day === selectedDay);
        const sorted = dayReminders.sort((a, b) => a.time.localeCompare(b.time));
        setReminders(sorted);
        if (sorted.length > 0) {
          setTimetableRows(sorted.map(rem => ({
            time: rem.time,
            duration: rem.durationMinutes,
            subject: rem.subject,
            isBreak: rem.subject.toLowerCase().includes('break')
          })));
        } else {
          setTimetableRows([{ time: '06:00', duration: 60, subject: '', isBreak: false }]);
        }
      };

      const formatEndTime = (startTime, durationMinutes) => {
        const [hours, minutes] = startTime.split(':').map(Number);
        const totalMinutes = hours * 60 + minutes + durationMinutes;
        const endHours = Math.floor(totalMinutes / 60) % 24;
        const endMinutes = totalMinutes % 60;
        return `${String(endHours).padStart(2, '0')}:${String(endMinutes).padStart(2, '0')}`;
      };

      const addRow = () => setTimetableRows(prev => [...prev, { time: '06:00', duration: 60, subject: '', isBreak: false }]);
      const addBreakRow = () => setTimetableRows(prev => [...prev, { time: '10:00', duration: 15, subject: 'Break', isBreak: true }]);
      const removeRow = (i) => setTimetableRows(prev => prev.filter((_, idx) => idx !== i));
      const updateTimetableRow = (i, field, value) => {
        setTimetableRows(prev => prev.map((row, idx) => idx === i ? { ...row, [field]: value } : row));
      };

      const handleSaveTimetable = async () => {
        const allReminders = await StorageService.getReminders(user.id);
        const dayReminders = allReminders.filter(rem => rem.day === selectedDay);
        for (const rem of dayReminders) { await StorageService.deleteReminder(rem.id); }
        for (const row of timetableRows) {
          if (!row.subject.trim()) continue;
          await StorageService.addReminder({ id: Date.now().toString() + Math.random().toString(36).substr(2), userId: user.id, subject: row.subject, time: row.time, durationMinutes: row.duration, day: selectedDay });
        }
        alert(`${selectedDay}'s timetable saved!`);
        refreshReminders();
        setShowTimetableEditor(false);
      };

      const handleDeleteReminder = async (id) => {
        await StorageService.deleteReminder(id);
        refreshReminders();
      };

      return (
        <div className="pb-24 safe-area-pad" style={{ paddingTop: '24px' }}>
          <div className="flex items-center justify-between mb-6"><div><h2 className="text-2xl font-bold text-gray-900">Welcome, {user.name?.split(' ')[0]}</h2><p className="text-gray-500 text-sm">{user.studentClass} • Stream {user.stream}</p></div></div>

          <div className="grid grid-cols-2 gap-4 mb-8">
            <div className="bg-gradient-to-br from-indigo-500 to-blue-500 rounded-2xl p-4 text-white shadow-lg"><div className="flex items-center mb-2"><Clock size={18} className="mr-2 text-indigo-200" /><span className="text-xs text-indigo-100 font-bold">Today</span></div><p className="text-3xl font-bold">{todayStats}m</p><p className="text-xs text-indigo-200">Study time</p></div>
            <div className="bg-gradient-to-br from-teal-500 to-emerald-500 rounded-2xl p-4 text-white shadow-lg"><div className="flex items-center mb-2"><Flame size={18} className="mr-2 text-teal-200" /><span className="text-xs text-teal-100 font-bold">Streak</span></div><p className="text-3xl font-bold">{reminders.length}</p><p className="text-xs text-teal-200">Subjects Today</p></div>
          </div>

          <section className="mb-8">
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-lg font-bold text-gray-800">My Timetable</h3>
              <div className="flex gap-2">
                <button onClick={() => setShowTimetableEditor(!showTimetableEditor)} className="text-xs bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full font-bold border border-indigo-100 hover:bg-indigo-100 flex items-center gap-1">
                  <Edit3 size={12} /> {showTimetableEditor ? 'Cancel' : 'Edit Timetable'}
                </button>
              </div>
            </div>
            <div className="flex gap-1 mb-4 overflow-x-auto no-scrollbar pb-1">
              {DAYS_OF_WEEK.map(day => (
                <button key={day} onClick={() => setSelectedDay(day)} className={`px-3 py-1.5 rounded-full text-xs font-bold shrink-0 transition ${selectedDay === day ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{day.slice(0, 3)}</button>
              ))}
            </div>
            {showTimetableEditor ? (
              <div className="bg-white rounded-xl border border-gray-100 overflow-hidden shadow-sm">
                <div className="overflow-x-auto">
                  <table className="w-full text-left">
                    <thead>
                      <tr className="bg-gray-50 border-b border-gray-100">
                        <th className="p-2 text-[10px] font-bold text-gray-500 uppercase">Subject</th>
                        <th className="p-2 text-[10px] font-bold text-gray-500 uppercase">Start</th>
                        <th className="p-2 text-[10px] font-bold text-gray-500 uppercase">Mins</th>
                        <th className="p-2 text-[10px] font-bold text-gray-500 uppercase">End</th>
                        <th className="p-1"></th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-50">
                      {timetableRows.map((row, i) => (
                        <tr key={i} className={`hover:bg-gray-50 ${row.isBreak ? 'bg-orange-50' : ''}`}>
                          <td className="p-2">
                            <input type="text" placeholder={row.isBreak ? "Break name" : "Subject"} className={`w-full p-1.5 rounded border text-xs focus:ring-1 focus:ring-indigo-400 outline-none ${row.isBreak ? 'border-orange-200 bg-orange-50' : 'border-gray-200'}`} value={row.subject} onChange={e => updateTimetableRow(i, 'subject', e.target.value)} />
                          </td>
                          <td className="p-2">
                            <select className="w-full p-1.5 rounded border border-gray-200 text-xs focus:ring-1 focus:ring-indigo-400 outline-none" value={row.time} onChange={e => updateTimetableRow(i, 'time', e.target.value)}>
                              {TIME_SLOTS.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                          </td>
                          <td className="p-2">
                            <input type="number" min="5" max="180" className="w-full p-1.5 rounded border border-gray-200 text-xs focus:ring-1 focus:ring-indigo-400 outline-none" value={row.duration} onChange={e => updateTimetableRow(i, 'duration', Number(e.target.value))} />
                          </td>
                          <td className="p-2">
                            <span className="text-[10px] text-gray-500 font-medium">{formatEndTime(row.time, row.duration)}</span>
                          </td>
                          <td className="p-1">
                            <button onClick={() => removeRow(i)} className="text-red-400 hover:text-red-600"><Trash2 size={12} /></button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="p-3 border-t border-gray-100 flex gap-2">
                  <button onClick={addRow} className="flex-1 bg-indigo-50 text-indigo-700 py-2 rounded-lg text-xs font-bold hover:bg-indigo-100 transition flex items-center justify-center gap-1">
                    <Plus size={14} /> Add Subject
                  </button>
                  <button onClick={addBreakRow} className="flex-1 bg-orange-50 text-orange-700 py-2 rounded-lg text-xs font-bold hover:bg-orange-100 transition flex items-center justify-center gap-1">
                    ☕ Add Break
                  </button>
                </div>
                <div className="p-3 border-t border-gray-100">
                  <button onClick={handleSaveTimetable} className="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-700 transition">
                    Save {selectedDay}'s Timetable
                  </button>
                </div>

              if (data.event === 'onStateChange' && data.info === 0) {

          try {

            if (iframe && iframe.contentWindow) {

        words.forEach(w => {
          if (topicAliases[w]) topicAliases[w].forEach(alias => expandedTerms.add(alias));
        });
        return videos.filter(v => {
          const title = v.title.toLowerCase();
          const cat = (v.category || '').toLowerCase();
          const combined = title + ' ' + cat;
          // Match if ANY expanded term is found in title or category
          for (const term of expandedTerms) {
            if (combined.includes(term)) return true;
          }
          // Also match if ALL original words appear somewhere
          if (words.every(w => combined.includes(w))) return true;
          return false;
        }).sort((a, b) => {
          // Rank: exact phrase match first, then word count matches
          const aTitle = a.title.toLowerCase();
          const bTitle = b.title.toLowerCase();
          const aExact = aTitle.includes(query) ? 1 : 0;
          const bExact = bTitle.includes(query) ? 1 : 0;
          if (aExact !== bExact) return bExact - aExact;
          const aCount = words.filter(w => aTitle.includes(w)).length;
          const bCount = words.filter(w => bTitle.includes(w)).length;
          return bCount - aCount;
        });
      };

      const searchFiltered = smartSearch(allVideos, searchTerm);

      // Then filter by active category (unless searching)
      const filtered = searchTerm
        ? searchFiltered
        : activeCategory === 'All'

          const last7 = analytics.slice(-7).map(a => ({ name: new Date(a.date).toLocaleDateString('en-US', { weekday: 'short' }), reading: a.minutesReading || 0, watching: a.minutesWatching || 0, minutes: a.minutesSpent }));
          if (last7.length === 0) last7.push({ name: 'Today', reading: 0, watching: 0, minutes: 0 });
          setData(last7);
          const total = analytics.reduce((sum, curr) => sum + curr.minutesSpent, 0);
          const totalR = analytics.reduce((sum, curr) => sum + (curr.minutesReading || 0), 0);
          const totalW = analytics.reduce((sum, curr) => sum + (curr.minutesWatching || 0), 0);
          setTotalMinutes(total);
          setTotalReadingMinutes(totalR);
          setTotalWatchingMinutes(totalW);
          const activeDays = analytics.filter(a => a.minutesSpent > 0).map(a => a.date);
          setCalendarDays(activeDays);
          setStudyStreak(activeDays.length);
        });
      }, [user.id]);

      const handleChangeAvatar = async () => {
        const avatarList = user.gender === Gender.FEMALE ? FEMALE_AVATARS : MALE_AVATARS;
        const randomAvatar = avatarList[Math.floor(Math.random() * avatarList.length)];
        setCurrentAvatar(randomAvatar);
        await StorageService.updateUserAvatar(user.id, randomAvatar);
        StorageService.setCurrentUser({ ...user, avatarUrl: randomAvatar });
      };

      const handleChangePin = async (e) => {
        e.preventDefault();
        if (oldPin !== user.pin) { alert("Incorrect Old PIN"); return; }
        if (newPin.length < 4) { alert("New PIN must be at least 4 digits"); return; }
        if (newPin !== confirmPin) { alert("New PINs do not match"); return; }
        await StorageService.updateUserPin(user.id, newPin);
        StorageService.setCurrentUser({ ...user, pin: newPin });
        alert("PIN Changed Successfully!"); setShowPinChange(false); setOldPin(''); setNewPin(''); setConfirmPin('');
      };

      const handleSoundChange = (soundKey) => {
        setSelectedSound(soundKey);
        localStorage.setItem('easyplus_notification_sound', soundKey);
        // Play preview
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          NOTIFICATION_SOUNDS[soundKey]?.play(audioCtx);
        } catch (e) { }
      };

      const renderCalendar = () => {
        const now = new Date();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const days = [];
        const currentMonthPrefix = now.toISOString().slice(0, 7);
        for (let i = 1; i <= daysInMonth; i++) {
          const dayStr = `${currentMonthPrefix}-${String(i).padStart(2, '0')}`;
          const isActive = calendarDays.includes(dayStr);
          days.push(<div key={i} className={`h-8 w-8 rounded-lg flex items-center justify-center text-xs font-bold mb-1 ${isActive ? 'bg-green-500 text-white shadow-md' : 'bg-gray-100 text-gray-400'}`}>{i}</div>);
        }
        return days;
      };

      const getMotivation = () => {
        const hours = totalMinutes / 60;
        if (hours < 1) return "A journey of a thousand miles begins with a single step. Start now!";
        if (hours < 5) return "Great start! Consistency is the key to mastery.";
        if (hours < 10) return "You're building a powerful habit. Keep going!";
        if (hours < 20) return "You are unstoppable! Your future self will thank you.";
        return "True Scholar Status! You are mastering your craft.";
      };

      return (
        <div className="pb-24 safe-area-pad" style={{ paddingTop: '24px' }}>
          <div className="flex flex-col items-center mb-8">
            <div className="relative group">
              <div className="w-24 h-24 bg-gradient-to-tr from-indigo-400 to-purple-400 rounded-full flex items-center justify-center text-white text-3xl font-bold mb-4 shadow-lg overflow-hidden border-4 border-white">{currentAvatar ? (<img src={currentAvatar} className="w-full h-full object-cover" />) : (<span>{user.name.charAt(0)}</span>)}</div>
              <button onClick={handleChangeAvatar} className="absolute bottom-4 right-0 bg-white p-2 rounded-full shadow-md hover:bg-gray-100 text-indigo-600 transition"><RefreshCw size={16} /></button>
            </div>
            <h2 className="text-2xl font-bold text-gray-900">{user.name}</h2><p className="text-gray-500">{user.studentClass} • Stream {user.stream}</p>
            <div className="flex gap-2 mt-4">
              <button onClick={() => setShowPinChange(!showPinChange)} className="flex items-center text-xs font-semibold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full hover:bg-indigo-100 transition"><Key size={12} className="mr-1" /> Change PIN</button>
              <button onClick={() => setShowSoundSettings(!showSoundSettings)} className="flex items-center text-xs font-semibold text-teal-600 bg-teal-50 px-3 py-1.5 rounded-full hover:bg-teal-100 transition"><Volume2 size={12} className="mr-1" /> Sounds</button>
              <button onClick={() => { if ('Notification' in window && Notification.permission !== 'granted') { Notification.requestPermission(); } }} className="flex items-center text-xs font-semibold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full hover:bg-indigo-100 transition"><Bell size={12} className="mr-1" /> Notifications</button>
            </div>
          </div>

          {/* Notification Sound Settings */}
          {showSoundSettings && (
            <div className="bg-white p-5 rounded-xl shadow-lg border border-gray-100 mb-6 animate-in">
              <h3 className="font-bold text-gray-800 mb-4 flex items-center"><Volume2 size={18} className="mr-2 text-teal-500" /> Notification Sound</h3>
              <div className="space-y-2">
                {Object.entries(NOTIFICATION_SOUNDS).map(([key, sound]) => (
                  <button key={key} onClick={() => handleSoundChange(key)}
                    className={`w-full flex items-center justify-between p-3 rounded-xl border transition ${selectedSound === key ? 'border-teal-500 bg-teal-50' : 'border-gray-100 hover:bg-gray-50'}`}>
                    <div className="flex items-center gap-3">
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center ${selectedSound === key ? 'bg-teal-500 text-white' : 'bg-gray-100 text-gray-500'}`}>
                        {key === 'none' ? <X size={14} /> : <Music size={14} />}
                      </div>
                      <span className={`text-sm font-medium ${selectedSound === key ? 'text-teal-700' : 'text-gray-700'}`}>{sound.name}</span>
                    </div>
                    {selectedSound === key && <Check size={16} className="text-teal-600" />}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Notification Permissions & Settings */}
          <NotificationSettingsPanel />

          {showPinChange && (
            <form onSubmit={handleChangePin} className="bg-white p-6 rounded-xl shadow-lg border border-gray-100 mb-8 animate-in">
              <h3 className="font-bold text-gray-800 mb-4 flex items-center"><Shield size={18} className="mr-2 text-indigo-500" /> Secure PIN Update</h3>
              <div className="space-y-3"><input type="password" placeholder="Current PIN" className="w-full p-2 border rounded-lg text-sm" value={oldPin} onChange={e => setOldPin(e.target.value)} required /><input type="password" placeholder="New PIN" className="w-full p-2 border rounded-lg text-sm" value={newPin} onChange={e => setNewPin(e.target.value)} required /><input type="password" placeholder="Confirm New PIN" className="w-full p-2 border rounded-lg text-sm" value={confirmPin} onChange={e => setConfirmPin(e.target.value)} required /></div>
              <div className="flex gap-2 mt-4"><button type="button" onClick={() => setShowPinChange(false)} className="flex-1 py-2 text-gray-500 text-sm">Cancel</button><button type="submit" className="flex-1 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold shadow-md">Update</button></div>
            </form>
          )}
          <div className="bg-gradient-to-r from-orange-400 to-pink-500 rounded-2xl p-6 text-white shadow-lg mb-6 relative overflow-hidden"><Zap size={100} className="absolute -right-4 -bottom-4 text-white opacity-20 rotate-12" /><h3 className="font-bold text-orange-100 text-sm uppercase tracking-wider mb-2">Motivation</h3><p className="text-lg font-bold leading-tight relative z-10">"{getMotivation()}"</p></div>
          <div className="grid grid-cols-2 gap-4 mb-6">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100"><div className="flex items-center text-gray-500 mb-2"><BookOpen size={16} className="mr-2 text-indigo-500" /><span className="text-xs font-bold uppercase">Reading</span></div><p className="text-2xl font-bold text-gray-900">{totalReadingMinutes >= 60 ? `${Math.floor(totalReadingMinutes / 60)}h ${totalReadingMinutes % 60}m` : `${totalReadingMinutes}m`}</p></div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100"><div className="flex items-center text-gray-500 mb-2"><PlaySquare size={16} className="mr-2 text-teal-500" /><span className="text-xs font-bold uppercase">Watching</span></div><p className="text-2xl font-bold text-gray-900">{totalWatchingMinutes >= 60 ? `${Math.floor(totalWatchingMinutes / 60)}h ${totalWatchingMinutes % 60}m` : `${totalWatchingMinutes}m`}</p></div>
          </div>
          <StudyTracker user={user} />
          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-6">
            <div className="flex items-center justify-between mb-4"><h3 className="font-bold text-gray-800 flex items-center"><BarChart2 size={18} className="mr-2 text-indigo-500" />Study Stats (7 Days)</h3><p className="text-sm text-gray-400">{totalMinutes >= 60 ? `${Math.floor(totalMinutes / 60)}h ${totalMinutes % 60}m total` : `${totalMinutes}m total`}</p></div>
            <div className="h-48">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={data}><XAxis dataKey="name" fontSize={11} tickLine={false} axisLine={false} /><YAxis fontSize={10} tickLine={false} axisLine={false} /><Tooltip /><Legend iconSize={10} wrapperStyle={{ fontSize: '11px' }} /><Bar dataKey="reading" stackId="a" fill="#6366f1" radius={[0, 0, 0, 0]} name="Reading" /><Bar dataKey="watching" stackId="a" fill="#14b8a6" radius={[4, 4, 0, 0]} name="Watching" /></BarChart>
              </ResponsiveContainer>
            </div>
          </div>
          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-6">
            <h3 className="font-bold text-gray-800 mb-4 flex items-center"><Calendar size={18} className="mr-2 text-green-500" /> Study Calendar ({new Date().toLocaleDateString('en-US', { month: 'long' })})</h3>
            <div className="grid grid-cols-7 gap-1.5 justify-items-center">{renderCalendar()}</div>
            <div className="mt-4 flex items-center gap-2 text-sm text-gray-600"><Trophy size={16} className="text-green-500" /> <span className="font-bold">{studyStreak} Active Day{studyStreak !== 1 ? 's' : ''}</span></div>
          </div>
          <div className="mb-6">
            <button onClick={async () => {
              if (confirm("Are you sure you want to reset all your study timing and days tracking? This action cannot be undone.")) {
                await StorageService.resetAnalytics(user.id);
                setData([{ name: 'Today', reading: 0, watching: 0, minutes: 0 }]);
                setTotalMinutes(0); setTotalReadingMinutes(0); setTotalWatchingMinutes(0);
                setStudyStreak(0); setCalendarDays([]);
                alert("Your tracking data has been reset successfully!");
              }
            }} className="w-full flex items-center justify-center py-3 bg-orange-50 border border-orange-200 text-orange-600 rounded-xl hover:bg-orange-100 transition font-semibold text-sm"><RefreshCw size={16} className="mr-2" /> Reset All Timing & Days</button>
          </div>
          <button onClick={onLogout} className="w-full flex items-center justify-center py-3 border border-red-200 text-red-600 rounded-xl hover:bg-red-50 transition"><LogOut size={18} className="mr-2" /> Log Out</button>
        </div>
      );
    };

    const Research = () => {
      const navigate = useNavigate();
      useEffect(() => {
        window.open('https://gemini.google.com', '_blank');
        navigate('/student/home');
      }, []);
      return (
        <div style={{ width: '100%', height: 'calc(100vh - 60px)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
          <Globe size={48} className="text-indigo-500 mb-4" />
          <h2 className="text-xl font-bold text-gray-800 mb-2">Opening Gemini...</h2>
          <p className="text-gray-500 text-sm text-center mb-4">Google Gemini is opening in a new tab.</p>
          <button onClick={() => window.open('https://gemini.google.com', '_blank')} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Open Gemini Again</button>
        </div>
      );
    };

    // ================================================================
    // PDF LIBRARY - WITH OFFLINE INDEXEDDB CACHING
    // ================================================================
    const pdfCache = {};

    const Library = () => {
      const [selectedBook, setSelectedBook] = useState(null);
      const pdfContainerRef = useRef(null);
      const [currentPage, setCurrentPage] = useState(1);
      const [totalPages, setTotalPages] = useState(0);
      const [pdfLoading, setPdfLoading] = useState(false);
      const [loadProgress, setLoadProgress] = useState(0);
      const [cachedBooks, setCachedBooks] = useState([]);
      const [downloadingAll, setDownloadingAll] = useState(false);
      const [downloadProgress, setDownloadProgress] = useState('');
      const pdfDocRef = useRef(null);
      const renderTaskRef = useRef(null);

      const books = [
        { title: 'Chemistry book 2', file: 'KLB-Chem-FORM-2.pdf', cover: 'chemistrybook2.png' },
        { title: 'Oral Literature Notes', file: 'Oral_Literature_Notes.pdf', cover: 'literature.png' },
        { title: 'Physics book 1', file: 'physicsbook1.pdf', cover: 'physicsbook1.png' },
        { title: 'Biology book 1', file: 'Biology-Klb-Book-1.pdf', cover: 'biologybook1.png' },
        { title: 'Inventor book 2', file: 'INVENTOR-BK2.pdf', cover: 'businessbook2.png' },
        { title: 'Chemistry book 3', file: 'Chemistry-Form-3.pdf', cover: 'chemistry book3.png' },
        { title: 'Physics book 2', file: 'KLBPhysicsBook2.pdf', cover: 'physicsbook2.png' },
        { title: 'Physics book3', file: 'PHYSICS-KLB-BK3.pdf', cover: 'physics.png' },
        { title: 'Mathematics book3', file: 'KLB-Form-3-Mathematics-1.pdf', cover: 'math.png' },
        { title: 'Madefamilier Maths', file: 'MadeFamilier (1).pdf', cover: 'madefamilier.png' },
        { title: 'KLB Biology Book 3', file: 'Klb-Biology-Book-3-5th-Edition.pdf', cover: 'biology.png' },
        { title: 'Four-Figure Tables', file: 'Four-figure-5th edition.pdf', cover: 'figure4.png' }
      ];

      const selfDevBooks = [
        { title: 'The Law of Attraction', file: 'Abraham-Hicks - The Law of Attraction.pdf', cover: 'lawofattraction.png' },
        { title: 'Atomic Habits', file: 'Atomic-Habits-PDF-Download.pdf', cover: 'atomic habits.png' },
        { title: 'Between Death & Life', file: 'between-death-amp-life-dolores-cannon-pdf.pdf', cover: 'deathamp.png' },
        { title: "Can't Hurt Me", file: 'CantHurtmee.pdf', cover: 'cantHurtmee.png' },
        { title: 'Personal Financial Planning', file: 'PERSONALFINANCIALPLANNING.pdf', cover: 'personal planning.png' },
        { title: 'The Simple Path to Wealth', file: 'Preview-The-Simple-Path-to-Wealth-by-JL-Collins.pdf', cover: 'path to wealth.png' },
        { title: 'The 48 Laws of Power', file: 'The-48-Laws-Of-Power.pdf', cover: 'lawsofpower.png' }
      ];

      // Check which PDFs are cached
      useEffect(() => {
        const checkCached = async () => {
          const keys = await getAllCachedPdfKeys();
          setCachedBooks(keys);
        };
        checkCached();
      }, [selectedBook]);

      const isBookCached = (file) => cachedBooks.includes(file);

      // Download All PDFs
      const handleDownloadAll = async () => {
        if (!navigator.onLine) { alert('You need to be online to download PDFs.'); return; }
        if (!window.pdfjsLib) { alert('PDF.js not loaded yet.'); return; }
        setDownloadingAll(true);
        const allBooks = [...books, ...selfDevBooks];
        const uncached = allBooks.filter(b => !isBookCached(b.file));
        if (uncached.length === 0) { alert('All PDFs are already downloaded!'); setDownloadingAll(false); return; }
        for (let i = 0; i < uncached.length; i++) {
          const book = uncached[i];
          setDownloadProgress(`Downloading ${book.title} (${i + 1}/${uncached.length})...`);
          try {
            const response = await fetch(book.file);
            if (response.ok) {
              const arrayBuffer = await response.arrayBuffer();
              await cachePdfData(book.file, arrayBuffer);
            }
          } catch (e) { console.warn('Failed to download:', book.title); }
        }
        setDownloadProgress('');
        setDownloadingAll(false);
        const keys = await getAllCachedPdfKeys();
        setCachedBooks(keys);
        alert('All PDFs downloaded for offline use!');
      };

      const renderPage = (pageNum, highQuality) => {
        if (!pdfDocRef.current || !pdfContainerRef.current) return;
        if (renderTaskRef.current) {
          try { renderTaskRef.current.cancel(); } catch (e) { }
          renderTaskRef.current = null;
        }
        const container = pdfContainerRef.current;
        container.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px;font-size:13px;">Rendering page ' + pageNum + '...</p>';
        const containerWidth = container.clientWidth || window.innerWidth;
        const displayWidth = containerWidth - 16;
        pdfDocRef.current.getPage(pageNum).then(function (page) {
          container.innerHTML = '';
          const baseViewport = page.getViewport({ scale: 1 });
          const fitScale = displayWidth / baseViewport.width;
          const dpr = highQuality ? Math.min(window.devicePixelRatio || 1, 3) : 1;
          const renderScale = fitScale * dpr;
          const renderViewport = page.getViewport({ scale: renderScale });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.width = renderViewport.width;
          canvas.height = renderViewport.height;
          const displayHeight = Math.floor(displayWidth * baseViewport.height / baseViewport.width);
          canvas.style.width = displayWidth + 'px';
          canvas.style.height = displayHeight + 'px';
          canvas.style.display = 'block';
          canvas.style.margin = '0 auto';
          canvas.style.boxShadow = '0 0 15px rgba(255,255,255,0.15)';
          canvas.style.borderRadius = '8px';
          container.appendChild(canvas);
          const task = page.render({ canvasContext: context, viewport: renderViewport });
          renderTaskRef.current = task;
          task.promise.then(function () {
            // Cache the rendered page as an image for offline use
            try {
              const imgDataUrl = canvas.toDataURL('image/jpeg', 0.85);
              cachePdfPageImage(selectedBook, pageNum, imgDataUrl);
            } catch (e) { }
            if (!highQuality && pdfDocRef.current) {
              renderPage(pageNum, true);
            }
          }).catch(function () { /* cancelled */ });
        });
      };

      useEffect(() => {
        if (!selectedBook) { pdfDocRef.current = null; setLoadProgress(0); return; }
        if (!pdfContainerRef.current) return;
        const container = pdfContainerRef.current;
        setPdfLoading(true);
        setLoadProgress(5);

        const loadPdf = async () => {
          if (!window.pdfjsLib) {
            // Offline and PDF.js not loaded
            if (!navigator.onLine) {
              setPdfLoading(false);
              container.innerHTML = '<div style="text-align:center;padding:40px;"><p style="color:#ff6b6b;font-size:16px;margin-bottom:10px;">📶 You are offline</p><p style="color:#aaa;font-size:13px;">This PDF hasn\'t been downloaded yet. Connect to the internet to load and cache it for offline use.</p></div>';
            } else {
              setPdfLoading(false);
              container.innerHTML = '<p style="color:#ff6b6b;text-align:center;padding:40px;">PDF.js library not loaded. Please refresh the page.</p>';
            }
            return;
          }

          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          setLoadProgress(10);

          // Check in-memory cache first
          if (pdfCache[selectedBook]) {
            pdfDocRef.current = pdfCache[selectedBook];
            setTotalPages(pdfCache[selectedBook].numPages);
            setCurrentPage(1);
            setPdfLoading(false);
            setLoadProgress(100);
            renderPage(1, false);
            return;
          }

          setLoadProgress(20);

          // Try to load from IndexedDB cache (offline support)
          let pdfData = await getCachedPdf(selectedBook);
          setLoadProgress(30);

          if (pdfData) {
            try {
              setLoadProgress(50);
              const pdf = await window.pdfjsLib.getDocument({ data: pdfData }).promise;
              pdfCache[selectedBook] = pdf;
              pdfDocRef.current = pdf;
              setTotalPages(pdf.numPages);
              setCurrentPage(1);
              setPdfLoading(false);
              setLoadProgress(100);
              renderPage(1, false);
              return;
            } catch (e) {
              console.warn('Cached PDF corrupted, re-downloading...');
            }
          }

          // Offline and not cached - try showing cached page images
          if (!navigator.onLine) {
            // Try to load cached page images
            const firstPageImg = await getCachedPdfPageImage(selectedBook, 1);
            if (firstPageImg) {
              setPdfLoading(false);
              setLoadProgress(100);
              container.innerHTML = '';
              // Load all cached page images
              let pageNum = 1;
              while (true) {
                const imgData = await getCachedPdfPageImage(selectedBook, pageNum);
                if (!imgData) break;
                const img = document.createElement('img');
                img.src = imgData;
                img.style.cssText = 'display:block;margin:8px auto;max-width:100%;border-radius:8px;box-shadow:0 0 15px rgba(255,255,255,0.15);';
                img.alt = 'Page ' + pageNum;
                container.appendChild(img);
                pageNum++;
              }
              const note = document.createElement('p');
              note.style.cssText = 'text-align:center;color:#aaa;font-size:12px;padding:16px;';
              note.textContent = '📶 Offline mode - showing cached page images (' + (pageNum - 1) + ' pages)';
              container.insertBefore(note, container.firstChild);
              setTotalPages(pageNum - 1);
              setCurrentPage(1);
              return;
            }
            setPdfLoading(false);
            setLoadProgress(0);
            container.innerHTML = '<div style="text-align:center;padding:40px;"><p style="color:#ff6b6b;font-size:16px;margin-bottom:10px;">📶 You are offline</p><p style="color:#aaa;font-size:13px;">This PDF hasn\'t been downloaded yet.<br/>Connect to the internet to download it, then it will work offline.</p></div>';
            return;
          }

          // Fetch from network with progress tracking
          try {
            setLoadProgress(35);
            const response = await fetch(selectedBook);
            if (!response.ok) throw new Error('Network error: ' + response.status);

            const contentLength = response.headers.get('content-length');
            const total = contentLength ? parseInt(contentLength) : 0;
            const reader = response.body.getReader();
            const chunks = [];
            let receivedLength = 0;

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              receivedLength += value.length;
              if (total > 0) {
                setLoadProgress(35 + Math.floor((receivedLength / total) * 50));
              }
            }

            const arrayBuffer = new Uint8Array(receivedLength);
            let position = 0;
            for (const chunk of chunks) {
              arrayBuffer.set(chunk, position);
              position += chunk.length;
            }

            setLoadProgress(88);
            await cachePdfData(selectedBook, arrayBuffer.buffer);

            setLoadProgress(92);
            const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer.buffer }).promise;
            pdfCache[selectedBook] = pdf;
            pdfDocRef.current = pdf;
            setTotalPages(pdf.numPages);
            setCurrentPage(1);
            setPdfLoading(false);
            setLoadProgress(100);
            renderPage(1, false);
          } catch (error) {
            setPdfLoading(false);
            setLoadProgress(0);
            container.innerHTML = '<p style="color:#ff6b6b;text-align:center;padding:40px;">Error loading PDF: ' + error.message + '<br/><br/><span style="color:#aaa;font-size:12px;">Make sure you have an internet connection for the first load. After that, the PDF will be available offline.</span></p>';
          }
        };

        loadPdf();
      }, [selectedBook]);

      useEffect(() => {
        if (pdfDocRef.current && currentPage >= 1 && currentPage <= totalPages) {
          renderPage(currentPage, false);
        }
      }, [currentPage]);

      const goNextPage = () => { if (currentPage < totalPages) setCurrentPage(prev => prev + 1); };
      const goPrevPage = () => { if (currentPage > 1) setCurrentPage(prev => prev - 1); };

      if (selectedBook) {
        return (
          <div className="flex flex-col" style={{ background: '#111', minHeight: '100vh', paddingBottom: '80px' }}>
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100, display: 'flex', flexDirection: 'column', background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(10px)' }}>

      useEffect(() => {
