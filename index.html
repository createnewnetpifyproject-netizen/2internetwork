    // ================================================================
    // ENHANCED STUDY TRACKER (3 days, 1 week, 1 month)
    // ================================================================
    const StudyTracker = ({ user }) => {
      const [period, setPeriod] = useState('7');
      const [data, setData] = useState([]);
      const [totalReading, setTotalReading] = useState(0);
      const [totalWatching, setTotalWatching] = useState(0);
      const [isEligible, setIsEligible] = useState(false);

      useEffect(() => {
        // Check if user has been registered for 7+ days
        const createdAt = user.createdAt || 0;
        const daysSinceCreation = (Date.now() - createdAt) / (1000 * 60 * 60 * 24);
        setIsEligible(daysSinceCreation >= 7 || createdAt === 0);
      }, [user]);

      useEffect(() => {
        if (!isEligible) return;
        StorageService.getAnalytics(user.id).then(analytics => {
          const days = Number(period);
          const cutoff = new Date();
          cutoff.setDate(cutoff.getDate() - days);
          const cutoffStr = cutoff.toISOString().split('T')[0];
          const filtered = analytics.filter(a => a.date >= cutoffStr);
          const chartData = filtered.map(a => ({
            name: new Date(a.date).toLocaleDateString('en-US', days <= 7 ? { weekday: 'short' } : { month: 'short', day: 'numeric' }),
            reading: a.minutesReading || 0,
            watching: a.minutesWatching || 0,
            total: a.minutesSpent || 0
          }));
          if (chartData.length === 0) chartData.push({ name: 'No Data', reading: 0, watching: 0, total: 0 });
          setData(chartData);
          setTotalReading(filtered.reduce((s, a) => s + (a.minutesReading || 0), 0));
          setTotalWatching(filtered.reduce((s, a) => s + (a.minutesWatching || 0), 0));
        });
      }, [user.id, period, isEligible]);

      if (!isEligible) {
        return (
          <div className="bg-gray-50 border border-gray-200 rounded-xl p-6 mb-6 text-center">
            <Clock size={32} className="mx-auto text-gray-400 mb-2" />
            <p className="text-gray-500 text-sm">Study tracking graphs will be available after 7 days of using the app.</p>
          </div>
        );
      }

      const totalMinutes = totalReading + totalWatching;

      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-gray-800 flex items-center"><BarChart2 size={18} className="mr-2 text-indigo-500" />Study Tracker</h3>
            <div className="flex gap-1">
              {[{ label: '3 Days', val: '3' }, { label: '1 Week', val: '7' }, { label: '1 Month', val: '30' }].map(p => (
                <button key={p.val} onClick={() => setPeriod(p.val)} className={`px-3 py-1 rounded-full text-xs font-bold transition ${period === p.val ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-600'}`}>{p.label}</button>
              ))}
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3 mb-4">
            <div className="bg-indigo-50 rounded-lg p-3 text-center"><p className="text-xs text-gray-500 font-bold">Total</p><p className="text-lg font-bold text-indigo-700">{totalMinutes >= 60 ? Math.floor(totalMinutes / 60) + 'h ' + totalMinutes % 60 + 'm' : totalMinutes + 'm'}</p></div>
            <div className="bg-blue-50 rounded-lg p-3 text-center"><p className="text-xs text-gray-500 font-bold">Reading</p><p className="text-lg font-bold text-blue-700">{totalReading >= 60 ? Math.floor(totalReading / 60) + 'h' : totalReading + 'm'}</p></div>
            <div className="bg-teal-50 rounded-lg p-3 text-center"><p className="text-xs text-gray-500 font-bold">Watching</p><p className="text-lg font-bold text-teal-700">{totalWatching >= 60 ? Math.floor(totalWatching / 60) + 'h' : totalWatching + 'm'}</p></div>
          </div>
          <div className="h-52">
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={data}>
                <XAxis dataKey="name" fontSize={10} tickLine={false} axisLine={false} />
                <YAxis fontSize={10} tickLine={false} axisLine={false} label={{ value: 'Minutes', angle: -90, position: 'insideLeft', style: { fontSize: '10px', fill: '#999' } }} />
                <Tooltip formatter={(value, name) => [value + ' min', name === 'reading' ? 'Reading' : 'Watching']} />
                <Legend iconSize={10} wrapperStyle={{ fontSize: '11px' }} />
                <Bar dataKey="reading" stackId="a" fill="#6366f1" radius={[0, 0, 0, 0]} name="Reading" />
                <Bar dataKey="watching" stackId="a" fill="#14b8a6" radius={[4, 4, 0, 0]} name="Watching" />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      );
    };

    // ================================================================
    // VISUAL REMINDER BANNER (non-voice)
    // ================================================================
    const VisualReminderBanner = ({ reminder, onDismiss }) => {
      if (!reminder) return null;
      return (
        <div style={{ position: 'fixed', top: '50px', left: '12px', right: '12px', zIndex: 300, animation: 'bounce-in 0.3s ease-out' }} className="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl shadow-2xl p-4 text-white">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center"><Bell size={20} /></div>
              <div>
                <p className="font-bold text-sm">{reminder.isBreak ? '☕ Break Time!' : '📚 Study Time!'}</p>
                <p className="text-white/80 text-xs">{reminder.subject} • {reminder.durationMinutes} minutes</p>
              </div>
            </div>
            <button onClick={onDismiss} className="bg-white/20 p-2 rounded-full hover:bg-white/30"><X size={16} /></button>
          </div>
        </div>
      );
    };

    const App = () => {
      const [currentUser, setCurrentUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const user = StorageService.getCurrentUser();
        if (user) setCurrentUser(user);
        setLoading(false);
      }, []);

      const handleLogin = (user) => setCurrentUser(user);
      const handleLogout = () => { StorageService.setCurrentUser(null); setCurrentUser(null); };

      if (loading) return null;

      return (
        <Router>
          <Routes>
            <Route path="/" element={<Navigate to="/login" />} />
            <Route path="/videos" element={<><div className="min-h-screen bg-gray-100 pb-20"><VideoHub /></div><div className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 z-50 flex justify-around py-3"><Link to="/videos" className="flex flex-col items-center text-indigo-600"><PlaySquare size={24} /><span className="text-xs mt-1">Videos</span></Link><Link to="/login" className="flex flex-col items-center text-gray-400 hover:text-indigo-400"><UserIcon size={24} /><span className="text-xs mt-1">Login</span></Link></div></>} />
            <Route path="/login" element={currentUser ? (currentUser.role === UserRole.ADMIN ? <Navigate to="/admin/dashboard" /> : <Navigate to="/student/home" />) : (<Login onLogin={handleLogin} />)} />
            <Route path="/admin/dashboard" element={currentUser && currentUser.role === UserRole.ADMIN ? (<AdminDashboard onLogout={handleLogout} />) : (<Navigate to="/login" />)} />
            <Route path="/student/*" element={currentUser && currentUser.role === UserRole.STUDENT ? (<Layout user={currentUser}><Routes><Route path="home" element={<StudentHome user={currentUser} />} /><Route path="paywall" element={<PaywallScreen user={currentUser} />} /><Route path="videos" element={<VideoHub />} /><Route path="research" element={<Research />} /><Route path="library" element={<Library />} /><Route path="chat" element={<Chat user={currentUser} />} /><Route path="tasks" element={<TasksPage userId={currentUser?.id} />} /><Route path="profile" element={<Profile user={currentUser} onLogout={handleLogout} />} /><Route path="*" element={<Navigate to="home" />} /></Routes><BottomNav /></Layout>) : (<Navigate to="/login" />)} />
            <Route path="*" element={<Navigate to="/login" />} />
          </Routes>
        </Router>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    requestAnimationFrame(() => {
      setTimeout(() => { const s = document.getElementById('splash'); if (s) { s.style.opacity = '0'; s.style.transition = 'opacity 0.5s ease-out'; setTimeout(() => s.remove(), 500); } }, 2000);
    });

  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>

</body>

</html>
